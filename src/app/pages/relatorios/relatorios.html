<section class="pagina-relatorios">
  <div class="topo-pagina">
    <div>
      <h2>Relatórios</h2>
      <p>Indicadores gerais da gestão de internos e escalas.</p>
    </div>
  </div>

  <div class="kpis-grid">
    <div class="kpi-card">
      <span class="kpi-label">Total de Internos</span>
      <strong class="kpi-valor">{{ totalInternos }}</strong>
    </div>

    <div class="kpi-card">
      <span class="kpi-label">Internos Indisponíveis</span>
      <strong class="kpi-valor">{{ internosIndisponiveis }}</strong>
    </div>

    <div class="kpi-card">
      <span class="kpi-label">Total de Escalas</span>
      <strong class="kpi-valor">{{ totalEscalas }}</strong>
    </div>

    <div class="kpi-card">
      <span class="kpi-label">Escalas este mês</span>
      <strong class="kpi-valor">{{ escalasMesAtual }}</strong>
    </div>
  </div>
</section>
