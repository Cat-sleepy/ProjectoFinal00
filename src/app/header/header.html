<div class="cabecalho">
  <div class="logo-area" (click)="irDashboard()">
    <img [src]="logo" class="logo" alt="Logo" />
    <h1>{{ titulo }}</h1>
  </div>

  <div class="menu">
    <input
      type="text"
      placeholder="Pesquisar por nome..."
      [(ngModel)]="textoPesquisa"
      (input)="pesquisarPorNome()"
    />

    <div class="opcoes">
      <button (click)="novaAtribuicao()">Nova Atribuição</button>
      <button (click)="novoInterno()">Adicionar Interno</button>

    </div>
  </div>
</div>
